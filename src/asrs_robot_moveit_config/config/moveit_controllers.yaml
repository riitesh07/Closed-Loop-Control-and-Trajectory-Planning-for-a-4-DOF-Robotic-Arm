move_group:
  ros__parameters:

    trajectory_execution:
      # MoveIt should NOT try to start/stop ros2_control controllers itself
      moveit_manage_controllers: false

      # Tell MoveIt which controller manager plugin to use
      moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

      # Give slow hardware (Teensy/steppers) more breathing room
      execution_duration_monitoring: true

      # Keep your current start tolerance (you had 0.6 in logs)
      allowed_start_tolerance: 0.6

    moveit_simple_controller_manager:
      controller_names:
        - arm_controller
        - gripper_controller

      arm_controller:
        type: FollowJointTrajectory
        action_ns: follow_joint_trajectory
        default: true
        joints:
          - continuous
          - revolute1
          - revolute2

        # Relax goal / trajectory tolerances so execution doesn't abort easily
        constraints:
          goal_time: 8.0
          stopped_velocity_tolerance: 0.05
          continuous: { goal: 0.20, trajectory: 0.40 }
          revolute1:  { goal: 0.20, trajectory: 0.40 }
          revolute2:  { goal: 0.20, trajectory: 0.40 }
          
      arm4_controller:
        type: FollowJointTrajectory
        action_ns: follow_joint_trajectory
        default: false
        joints:
          - continuous
          - revolute1
          - revolute2
          - revolute3
        constraints:
          goal_time: 10.0
          stopped_velocity_tolerance: 0.05
          continuous: { goal: 0.20, trajectory: 0.40 }
          revolute1:  { goal: 0.20, trajectory: 0.40 }
          revolute2:  { goal: 0.20, trajectory: 0.40 }
          revolute3:  { goal: 0.35, trajectory: 0.60 }

      gripper_controller:
        type: FollowJointTrajectory
        action_ns: follow_joint_trajectory
        default: false
        joints:
          - revolute3

        constraints:
          goal_time: 4.0
          stopped_velocity_tolerance: 0.05
          revolute3: { goal: 0.35, trajectory: 0.60 }

