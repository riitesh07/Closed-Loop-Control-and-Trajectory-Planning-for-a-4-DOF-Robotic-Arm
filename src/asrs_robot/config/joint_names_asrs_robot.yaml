controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      publish_rate: 50

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      joints:
        - continuous
        - revolute1
        - revolute2
        - revolute3
      state_publish_rate: 25
      action_monitor_rate: 10
      constraints:
        goal_time: 0.5
        stopped_velocity_tolerance: 0.01
        continuous:
          trajectory: 0.05
        revolute1:
          trajectory: 0.05
        revolute2:
          trajectory: 0.05
        revolute3:
          trajectory: 0.05
      gains:
        continuous: {p: 100.0, i: 0.01, d: 0.01}
        revolute1: {p: 100.0, i: 0.01, d: 0.01}
        revolute2: {p: 100.0, i: 0.01, d: 0.01}
        revolute3: {p: 100.0, i: 0.01, d: 0.01}

